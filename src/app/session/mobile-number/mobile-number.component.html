<ion-content [fullscreen]="true" class="main-content" scroll-y="false">
  <div class="login-page-wrapper">

    <!-- Full Screen Background -->
    <div class="hero-section">
      <img src="../../../assets/images/login_page_b.jpeg" class="hero-img" />
      <div class="overlay-gradient"></div>
    </div>

    <!-- Centered Glass Card -->
    <div class="glass-login-card">
      <div class="brand-content">
        <img src="../../../assets/images/EV-final-logo1.png" class="evegah-title-text" />
        <p class="tagline">India's Smartest EV Mobility</p>
      </div>

      <div class="card-body">
        <h2 class="welcome-text">Login or Signup</h2>
        <p class="helper-text">Enter your phone number to get started</p>

        <div class="input-capsule">
          <div class="country-trigger">
            <img src="https://flagcdn.com/w40/in.png" class="flag" />
            <span class="code">+91</span>
            <ion-icon name="chevron-down-outline" class="dropdown-icon"></ion-icon>
          </div>

          <div class="vertical-divider"></div>

          <ion-input type="tel" maxlength="10" placeholder="99887 76655" [(ngModel)]="mobileNumber"
            (keyup)="handleEnterKeyEvent($event)" class="phone-input">
          </ion-input>
        </div>

        <p *ngIf="errorMsg" class="error-msg">
          <ion-icon name="alert-circle"></ion-icon> {{ errorMsg }}
        </p>

        <button class="btn-continue" (click)="next()" [disabled]="!mobileNumber || isLoading">
          <span *ngIf="!isLoading">Continue</span>
          <ion-spinner name="crescent" *ngIf="isLoading"></ion-spinner>
        </button>

        <button class="btn-biometric" *ngIf="showBiometricLogin" (click)="loginWithBiometric()"
          [disabled]="biometricLoading || isLoading">
          <ion-icon name="finger-print-outline"></ion-icon>
          <span *ngIf="!biometricLoading">Login with Biometrics</span>
          <ion-spinner name="crescent" *ngIf="biometricLoading"></ion-spinner>
        </button>

        <p class="terms-text">
          By continuing, you agree to our
          <a (click)="navigateMenu('/home/privacyPolicy')">Terms</a> &
          <a (click)="navigateMenu('/home/privacyPolicy')">Privacy Policy</a>
        </p>
      </div>

      <div class="version-footer">
        v{{version}}
      </div>
    </div>

    <!-- Background Decorative Elements -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

  </div>
</ion-content>
